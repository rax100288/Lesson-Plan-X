<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>RC Tense Challenge Ultimate</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        #header { background-color: #4CAF50; color: white; padding: 10px 20px; text-align: center; }\n        #lobby { margin: 20px; padding: 20px; border: 1px solid #ddd; }\n        .tense-pattern { margin-top: 10px; padding: 5px; border: 1px solid #ccc; }\n        .confetti { display: none; position: absolute; width: 5px; height: 5px; background: red; }\n    </style>\n</head>\n<body>\n    <div id="header">\n        <h1>Welcome to the RC Tense Challenge Ultimate!</h1>\n    </div>\n    <div id="lobby">\n        <h2>Lobby</h2>\n        <button id="start-game">Start Game</button>\n        <div id="tense-patterns">\n            <div class="tense-pattern">be-present</div>\n            <div class="tense-pattern">there-is-are</div>\n            <div class="tense-pattern">simple-present</div>\n        </div>\n    </div>\n    <script>\n        document.getElementById('start-game').addEventListener('click', function() {\n            // Game logic starts here\n            initiateVoiceRecognition();\n            showConfetti();\n        });\n\n        function initiateVoiceRecognition() {\n            // Voice recognition logic goes here\n            console.log('Voice recognition initialized.');\n        }\n\n        function showConfetti() {\n            // Confetti effect logic goes here\n            const confetti = document.createElement('div');\n            confetti.className = 'confetti';\n            document.body.appendChild(confetti);\n            setTimeout(() => { confetti.style.display = 'block'; }, 100);\n            setTimeout(() => { confetti.remove(); }, 2000);\n        }\n    </script>\n</body>\n</html>
